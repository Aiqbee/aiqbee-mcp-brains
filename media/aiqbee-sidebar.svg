<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Monochrome Aiqbee "qb" logo for VS Code Activity Bar -->
  <!-- Left loop (q) - upper left -->
  <circle cx="8" cy="8" r="3.8" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Right loop (b) - lower right -->
  <circle cx="16" cy="16" r="3.8" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Diagonal crossbar -->
  <line x1="10" y1="11" x2="14" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vertical stem through centre -->
  <line x1="12" y1="3.5" x2="12" y2="20.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
